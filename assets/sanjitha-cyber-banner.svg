<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050816"/>
      <stop offset="0.55" stop-color="#071426"/>
      <stop offset="1" stop-color="#160720"/>
    </linearGradient>

    <linearGradient id="neon">
