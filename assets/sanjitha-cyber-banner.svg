    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1500" height="520" fill="url(#bg)"/>
  <rect width="1500" height="520" fill="url(#grid)"/>

  <g filter="url(#glow)">
